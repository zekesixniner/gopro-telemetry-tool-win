<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GoPro MAX2 Telemetry Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 30px;
      height: 100vh;
    }
    h1 { font-size: 22px; margin-bottom: 6px; color: #00d4ff; }
    p.sub { font-size: 12px; color: #888; margin-bottom: 24px; }
    .row { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: #aaa; margin-bottom: 6px; }
    .file-row {
      display: flex; gap: 8px;
    }
    .file-row input {
      flex: 1;
      background: #16213e;
      border: 1px solid #333;
      color: #eee;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
    }
    button {
      background: #0f3460;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    button:hover { background: #16558e; }
    button:disabled { background: #333; cursor: not-allowed; }
    .formats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 6px;
    }
    .format-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .format-item input { cursor: pointer; }
    .format-item span { font-size: 13px; }
    .format-item small { font-size: 10px; color: #666; display: block; }
    #extract-btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      background: #00d4ff;
      color: #000;
      font-weight: bold;
      border-radius: 8px;
      margin-top: 8px;
    }
    #extract-btn:hover { background: #00b8d9; }
    #extract-btn:disabled { background: #333; color: #666; }
    .progress-wrap {
      margin-top: 20px;
      display: none;
    }
    .progress-bar-bg {
      background: #16213e;
      border-radius: 8px;
      height: 12px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 100%;
      background: #00d4ff;
      border-radius: 8px;
      transition: width 0.3s;
      width: 0%;
    }
    #log {
      font-size: 12px;
      color: #aaa;
      height: 80px;
      overflow-y: auto;
      background: #16213e;
      border-radius: 6px;
      padding: 8px 12px;
    }
    #log div { margin-bottom: 2px; }
    #log div.done { color: #00ff88; font-weight: bold; }
    #log div.err  { color: #ff4444; }
  </style>
</head>
<body>
  <h1>GoPro MAX2 Telemetry Tool</h1>
  <p class="sub">Extract telemetry from GoPro MAX2 .360 files · github.com/zekesixniner</p>

  <div class="row">
    <label>Input file (.360 / .mp4 / .mov)</label>
    <div class="file-row">
      <input id="input-path" readonly placeholder="No file selected...">
      <button id="btn-input">Browse</button>
    </div>
  </div>

  <div class="row">
    <label>Output folder</label>
    <div class="file-row">
      <input id="output-path" readonly placeholder="No folder selected...">
      <button id="btn-output">Browse</button>
    </div>
  </div>

  <div class="row">
    <label>Output formats</label>
    <div class="formats">
      <label class="format-item">
        <input type="checkbox" value="gpx" checked>
        <span>GPX <small>GPS Exchange</small></span>
      </label>
      <label class="format-item">
        <input type="checkbox" value="kml" checked>
        <span>KML <small>Google Earth</small></span>
      </label>
      <label class="format-item">
        <input type="checkbox" value="geojson">
        <span>GeoJSON <small>GIS / Maps</small></span>
      </label>
      <label class="format-item">
        <input type="checkbox" value="csv" checked>
        <span>JSON <small>All sensor streams</small></span>
      </label>
      <label class="format-item">
        <input type="checkbox" value="mgjson">
        <span>MGJSON <small>After Effects</small></span>
      </label>
      <label class="format-item">
        <input type="checkbox" value="virb">
        <span>VIRB <small>Garmin Virb</small></span>
      </label>
    </div>
  </div>

  <button id="extract-btn" disabled>Extract Telemetry</button>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div id="log"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    let inputFile = null;
    let outputDir = null;

    document.getElementById('btn-input').addEventListener('click', async () => {
      const f = await ipcRenderer.invoke('select-input');
      if (f) {
        inputFile = f;
        document.getElementById('input-path').value = f;
        checkReady();
      }
    });

    document.getElementById('btn-output').addEventListener('click', async () => {
      const d = await ipcRenderer.invoke('select-output');
      if (d) {
        outputDir = d;
        document.getElementById('output-path').value = d;
        checkReady();
      }
    });

    function checkReady() {
      document.getElementById('extract-btn').disabled = !(inputFile && outputDir);
    }

    document.getElementById('extract-btn').addEventListener('click', async () => {
      const formats = [...document.querySelectorAll('.formats input:checked')]
        .map(cb => cb.value);

      if (formats.length === 0) {
        alert('Please select at least one output format.');
        return;
      }

      document.getElementById('extract-btn').disabled = true;
      document.getElementById('progress-wrap').style.display = 'block';
      document.getElementById('log').innerHTML = '';

      const result = await ipcRenderer.invoke('extract', { inputFile, outputDir, formats });

      if (result.success) {
        document.getElementById('extract-btn').disabled = false;
      }
    });

    ipcRenderer.on('progress', (_, { msg, progress }) => {
      const bar = document.getElementById('progress-bar');
      bar.style.width = progress + '%';
      const log = document.getElementById('log');
      const div = document.createElement('div');
      div.textContent = msg;
      if (msg.startsWith('Done')) div.classList.add('done');
      if (msg.startsWith('Error')) div.classList.add('err');
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      if (progress >= 100) {
        document.getElementById('extract-btn').disabled = false;
      }
    });
  </script>
</body>
</html>
